<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Memory Game</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css"/>
  <link rel="stylesheet" href="./popup.css"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/images/icon.png"/>

</head>

<body class="bg-blue text-white min-vh-100">

  <!-- NAME POPUP -->
  <div class="popup-overlay hidden" id="registerPopup">
    <div class="popup">
      <h2>Enter Your Name</h2>

      <input
        type="text"
        id="username"
        placeholder="Your name eg: @username"
      />

      <p id="error" class="text-danger mb-3"></p>

      <button id="register-btn">Register</button>
    </div>
  </div>

  <!-- WIN POPUP -->
  <div class="popup-overlay hidden" id="winPopup">
    <div class="popup">

      <h2 id="winTitle" class="m-3 mb-4">
        🎉 Congrats!
      </h2>

      <p id="winMessage" class="m-3 mb-4"></p>

      <button id="play-again-button">
        Play Again
      </button>

    </div>
  </div>

  <div class="container py-5">

    <!-- Title -->
    <div class="text-center mb-5">

      <h1 class="display-4 fw-bold game-title">
        MEMORY GAME
      </h1>

      <p class="opacity-75">
        Match all cards to win
      </p>

    </div>

    <!-- Stats -->
    <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">

      <!-- Score -->
      <div class="bg-black rounded px-4 py-3 shadow text-center">

        <h5 class="mb-2">
          Score
        </h5>

        <game-counter id="score"></game-counter>

      </div>

      <!-- Moves -->
      <div class="bg-black rounded px-4 py-3 shadow text-center">

        <h5 class="mb-2">
          Moves
        </h5>

        <game-counter id="moves"></game-counter>

      </div>

      <!-- Timer -->
      <div class="bg-black rounded px-4 py-3 shadow text-center">

        <h5 class="mb-2">
          Timer
        </h5>

        <game-timer id="timer"></game-timer>

      </div>

    </div>

    <!-- Board -->
    <div class="mb-5 rounded px-1 py-4 shadow">

      <game-board id="board"></game-board>

    </div>

    <!-- Controls -->
    <div class="text-center">
      <game-button id="start-btn"></game-button>
    </div>

  </div>

  <!-- Footer -->
  <footer class="text-center pb-4">

    <p class="mb-0 text-light">

      Created by

      <a
        href="https://github.com/moateff"
        target="_blank"
        class="text-warning text-decoration-none fw-bold"
      >
        Mohamed Atef
      </a>

    </p>

  </footer>

  <!-- Main Script -->
  <script type="module" src="./dist/main.js"></script>

</body>

</html>
